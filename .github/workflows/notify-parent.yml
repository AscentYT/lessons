name: Notify parent repo

# When this submodule's main branch is updated, tell the parent repo
# (AscentYT/ascent-web) to refresh its submodule pointer, which in turn
# triggers a Vercel redeploy.

on:
  push:
    branches:
      - main

jobs:
  notify-parent:
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to parent
        env:
          PARENT_REPO_TOKEN: ${{ secrets.PARENT_REPO_TOKEN }}
        run: |
          curl --fail --silent --show-error -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PARENT_REPO_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/AscentYT/ascent-web/dispatches \
            -d '{"event_type":"submodule-updated"}'
